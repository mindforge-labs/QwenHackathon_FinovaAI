services:
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_started

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    environment:
      APP_NAME: ${APP_NAME:-Finova AI Backend}
      DEBUG: ${DEBUG:-false}
      AUTO_INIT_DB: ${AUTO_INIT_DB:-false}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://finova:finova@postgres:5432/finova}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-minio}
      FILESYSTEM_STORAGE_ROOT: ${FILESYSTEM_STORAGE_ROOT:-./storage}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME:-loan-docs}
      MINIO_SECURE: ${MINIO_SECURE:-false}
      OCR_ENABLED: ${OCR_ENABLED:-false}
      OCR_LANGUAGE: ${OCR_LANGUAGE:-en}
      OCR_USE_ANGLE_CLS: ${OCR_USE_ANGLE_CLS:-true}
      LLM_ENABLED: ${LLM_ENABLED:-false}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://generativelanguage.googleapis.com/v1beta/openai}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-30}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      MAX_REQUEST_SIZE_BYTES: ${MAX_REQUEST_SIZE_BYTES:-10485760}
      MAX_UPLOAD_SIZE_BYTES: ${MAX_UPLOAD_SIZE_BYTES:-8388608}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      minio-init:
        condition: service_completed_successfully

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: finova
      POSTGRES_USER: finova
      POSTGRES_PASSWORD: finova
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finova -d finova"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do
        echo 'Waiting for MinIO to accept connections...';
        sleep 2;
      done &&
      mc mb --ignore-existing local/loan-docs
      "

volumes:
  postgres_data:
  minio_data:
